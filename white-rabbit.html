<!-- white rabbit — a space to think through one hard decision -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />

<style>
  :root {
    --void: #0A0F0B;
    --screen: #10160F;
    --green: #7FE3A1;
    --green-dim: #74A98A;
    --voice: #E3ECDC;
    --user: #CFE6D2;
    --serif: "Newsreader", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --accent: var(--green);
    --accent-dim: var(--green-dim);
    --voice-c: var(--voice);
    --screen-c: var(--screen);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }

  body {
    background: var(--void);
    color: var(--voice);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    transition: background 1.6s ease;
    display: flex;
    justify-content: center;
  }

  body.reflecting {
    background: #0A0E15;
    --accent: #93B8DA;
    --accent-dim: #7E93A8;
    --voice-c: #DEE7EF;
    --screen-c: #11151D;
  }

  #rain {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    opacity: 1;
    transition: opacity 1.6s ease;
    pointer-events: none;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
  }

  header { padding: 40px 0 14px; flex-shrink: 0; }
  .wordmark {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--voice-c);
    margin: 0;
    transition: color 1.6s ease;
  }
  .cursor {
    display: inline-block;
    width: 9px; height: 17px;
    margin-left: 3px;
    background: var(--accent);
    transform: translateY(2px);
    animation: blink 1.1s step-end infinite;
    transition: background 1.6s ease;
  }
  @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
  .tagline {
    font-family: var(--mono);
    color: var(--accent-dim);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: lowercase;
    margin-top: 9px;
    transition: color 1.6s ease;
  }

  /* --- the two paths: poles the conversation orbits, and a gauge of where weight gathers --- */
  .paths {
    display: none;
    border-top: 1px solid rgba(116,169,138,0.22);
    border-bottom: 1px solid rgba(116,169,138,0.22);
    margin: 6px 0 4px;
    transition: padding 1.2s ease, border-color 1.6s ease;
  }
  .paths.shown { display: grid; grid-template-columns: 1fr 1px 1fr; }
  .path {
    position: relative;
    overflow: hidden;
    padding: 14px 16px;
    text-align: center;
    transition: padding 1.2s ease;
  }
  /* the fill is the felt weight, rising from the floor of each column */
  .path .fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0;
    background: linear-gradient(transparent, var(--accent) 140%);
    opacity: 0.14;
    pointer-events: none;
    transition: height 0.9s cubic-bezier(.22,.61,.36,1), opacity 1.6s ease, background 1.6s ease;
  }
  .path .ptext {
    position: relative;
    z-index: 1;
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.35;
    color: var(--voice-c);
    transition: color 1.6s ease, font-size 1.2s ease;
  }
  /* transient mark that rises when a reason lands, then fades — you feel weight gather */
  .floatmark {
    position: absolute;
    left: 0; right: 0;
    bottom: 8px;
    z-index: 2;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    text-align: center;
    color: var(--accent);
    pointer-events: none;
    animation: floatup 2.2s ease forwards;
  }
  .floatmark.stated { color: var(--accent-dim); font-size: 10px; }
  @keyframes floatup {
    0%   { opacity: 0; transform: translateY(6px); }
    18%  { opacity: 0.9; }
    75%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-22px); }
  }
  /* the full inventory of fragments — hidden during the interview, revealed in the room */
  .frags {
    display: none;
    position: relative;
    z-index: 1;
    margin-top: 14px;
    flex-direction: column;
    gap: 7px;
    align-items: center;
  }
  .frag {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  /* stated: the reasons you'd defend — outlined, cool, quiet */
  .frag.stated { color: var(--accent-dim); opacity: 0.85; }
  .frag.stated::before { content: "· "; opacity: 0.6; }
  /* felt: where the language actually lit up — filled, warm, present */
  .frag.felt {
    color: var(--accent);
    font-size: 14px;
    text-shadow: 0 0 14px var(--accent);
  }
  .paths .divider { background: rgba(116,169,138,0.22); }
  .paths .caption {
    display: none;
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--accent-dim);
    text-align: center;
    padding-top: 18px;
    opacity: 0;
    transition: opacity 1.2s ease 0.6s, color 1.6s ease;
  }

  /* --- the room: when the mirror arrives, the interview recedes and the paths rise --- */
  body.arrived .stage { justify-content: center; }
  body.arrived header { padding: 24px 0 8px; }
  body.arrived .tagline { opacity: 0; }
  body.arrived .log {
    max-height: 0;
    opacity: 0;
    padding: 0;
    margin: 0;
    overflow: hidden;
  }
  body.arrived .paths { padding: 6px 0; }
  body.arrived .path { padding: 30px 20px 34px; }
  body.arrived .path .ptext { font-size: 17px; }
  body.arrived .path .fill { opacity: 0.2; }
  body.arrived .frags { display: flex; animation: rise 1s ease both 0.4s; }
  body.arrived .paths .caption { display: block; opacity: 1; }

  .mirror {
    display: none;
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1.6;
    color: var(--voice-c);
    text-align: center;
    padding: 30px 6px 10px;
    transition: color 1.6s ease;
  }
  body.arrived .mirror { display: block; animation: rise 1.1s ease both 0.7s; }
  .mirror .handback {
    display: block;
    font-style: normal;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--accent-dim);
    margin-top: 22px;
    transition: color 1.6s ease;
  }

  .log {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 22px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .turn.companion .body {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.55;
    color: var(--voice-c);
    transition: color 1.6s ease;
  }
  .turn.companion.reflect .body { font-style: italic; font-size: 20px; }

  .turn.user { align-self: flex-end; max-width: 82%; }
  .turn.user .body {
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    color: var(--user);
    background: var(--screen-c);
    padding: 12px 15px;
    border: 1px solid rgba(116,169,138,0.18);
    border-radius: 3px;
    transition: background 1.6s ease;
  }

  .reveal { animation: rise 0.6s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .thinking { display: flex; align-items: center; height: 24px; }
  .thinking .blk {
    width: 9px; height: 16px;
    background: var(--accent);
    animation: blink 1.1s step-end infinite;
  }

  .care {
    font-family: var(--mono);
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 16px;
    color: var(--accent-dim);
    font-size: 13px;
    line-height: 1.7;
    border-radius: 0;
  }
  .care strong { color: var(--accent); }

  .dock {
    flex-shrink: 0;
    padding: 12px 0 26px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(transparent, var(--void) 24%);
    transition: background 1.6s ease;
  }
  body.reflecting .dock { background: linear-gradient(transparent, #0A0E15 24%); }
  .field {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--screen-c);
    border: 1px solid rgba(116,169,138,0.28);
    border-radius: 3px;
    padding: 9px 10px 9px 14px;
    transition: background 1.6s ease;
  }
  .field:focus-within { border-color: var(--accent); }
  .prompt-glyph {
    font-family: var(--mono);
    color: var(--accent);
    font-size: 15px;
    line-height: 1.6;
    flex-shrink: 0;
    transition: color 1.6s ease;
  }
  textarea {
    flex: 1;
    border: none; outline: none; resize: none;
    background: transparent;
    color: var(--user);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    max-height: 160px;
    padding: 2px 0;
  }
  textarea::placeholder { color: var(--accent-dim); opacity: 0.7; }
  .send {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border: 1px solid var(--accent);
    border-radius: 3px;
    background: transparent;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 1.6s ease;
  }
  .send:hover { background: var(--accent); color: var(--void); }
  .send:disabled { opacity: 0.35; cursor: default; }
  .send:disabled:hover { background: transparent; color: var(--accent); }

  .actions { display: none; gap: 10px; padding: 4px 0 30px; flex-shrink: 0; }
  .actions.shown { display: flex; }
  body.arrived .actions { justify-content: center; padding-top: 22px; animation: rise 1s ease both 0.9s; }
  .btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid rgba(116,169,138,0.4);
    background: transparent;
    color: var(--voice-c);
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--void); border-color: var(--accent); }

  .err { font-family: var(--mono); color: var(--accent); font-size: 13px; padding-top: 8px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    *, body, .dock, .send { transition: none !important; animation: none !important; }
    .reveal { animation: none !important; }
    .cursor, .thinking .blk { animation: none !important; }
    #rain { display: none; }
  }

  @media (max-width: 480px) {
    header { padding-top: 28px; }
    .turn.companion .body { font-size: 19px; }
  }
</style>

<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="stage">
    <header>
      <h1 class="wordmark">white rabbit<span class="cursor"></span></h1>
      <div class="tagline">for the decision you keep circling</div>
    </header>

    <div class="paths" id="paths">
      <div class="path">
        <div class="fill" id="fillA"></div>
        <div class="ptext" id="pathA"></div>
        <div class="frags" id="fragsA"></div>
      </div>
      <div class="divider"></div>
      <div class="path">
        <div class="fill" id="fillB"></div>
        <div class="ptext" id="pathB"></div>
        <div class="frags" id="fragsB"></div>
      </div>
      <div class="caption">dim: the reasons you gave&nbsp;&nbsp;·&nbsp;&nbsp;glow: what kept pulling</div>
    </div>

    <div class="log" id="log" aria-live="polite"></div>

    <div class="mirror" id="mirror" aria-live="polite"></div>

    <div class="actions" id="actions">
      <button class="btn primary" id="keep">keep this</button>
      <button class="btn" id="over">start another</button>
    </div>

    <div class="dock" id="dock">
      <div class="field">
        <span class="prompt-glyph" aria-hidden="true">&gt;</span>
        <textarea id="input" rows="1" placeholder="in your own words" aria-label="your answer"></textarea>
        <button class="send" id="send" aria-label="send">&#8629;</button>
      </div>
      <div class="err" id="err" hidden></div>
    </div>
  </div>

<script>
const SYSTEM_PROMPT = `You are the quiet voice inside white rabbit — a tool for thinking through ONE hard life decision. You are not a therapist, coach, or friend who fixes things. You're closer to a perceptive person across a table who asks the question no one else thought to, and who notices the difference between the reasons someone gives and what actually has weight for them.

Your job: help this person hear their own reasoning clearly enough to decide. You never tell them what to choose — you protect that the decision is theirs.

PRINCIPLES
- One question at a time. Never stack questions. Never give lists.
- Follow what they actually said — their specific words, what they lingered on, what they rushed past. Don't run a script.
- Warm and unhurried, but honest. Don't only validate. If they give the "responsible" answer while their language lights up around the other path, gently point at it.
- Notice the gap between stated reasons (what sounds defensible) and felt weight (what they're actually pulled toward or afraid of). That gap is the point.
- Brief: one to three sentences. No bullet points, no therapy-speak, no "it sounds like you're feeling."
- Don't rush to resolve. Sit in the hard part.

PHASES
- framing: On the first message, reflect the decision back in one line, name the two paths as you hear them (set pathA and pathB to short labels, 1-4 words each), and ask your first real question.
- interview: Keep asking, one question at a time. Surface values, fears, regrets, who they're performing for.
- mirror: When the real weight has surfaced (usually after 5-8 exchanges), STOP asking. This is the destination — the interview ends here. Reflect back the reasons they gave, what actually carries weight underneath, and the gap between them. The person can now SEE where each kind of weight gathered on the two paths, so speak to it: the defensible reasons piled one way, the pull that kept surfacing the other. Name the gap plainly and kindly. Do NOT pick for them. Put the reflection in "message" and one warm closing line that hands the decision back in "handback".
- close: Only if a full mirror hasn't happened. One framing that hands the decision back — put it in "message" and the hand-back line in "handback". Warm. Done.
- safety: If they express crisis-adjacent distress (hopelessness, self-harm, not wanting to be here), LEAVE the decision frame entirely. Respond with plain care, encourage reaching out to someone they trust or a crisis line, and do not keep interviewing. Never assess risk clinically or mention methods.

THE GAUGE (pulls)
After framing, every time the person speaks, read their message for the reasoning underneath and emit 0-2 "pulls". A pull attaches a short fragment of their own reasoning to one path. Two kinds, and the difference is the whole point:
- "stated": a reason they'd defend out loud — the sensible, responsible, justifiable surface. What they'd tell someone who asked.
- "felt": where their language actually lit up, what they lingered on, flinched from, kept circling back to. The gravitational pull, often half-spoken or spoken against.
A single message often holds both at once (the responsible reason toward one path, the ache toward the other) — that is exactly the gap to capture, so emit both.
- "label": 2-4 lowercase words, concrete, in their own frame. Not therapy-speak, not a summary of the whole message, not a line that could go on a mug. ("the salary", "leaving maya", "what dad would say", "the quiet after").
- "weight": 1 (a passing mention), 2 (real), 3 (this is heavy).
- "toward": "A" or "B" — which path this reason supports.
Only emit a pull when a genuine reason surfaced. A clarifying or throwaway message gets an empty list. Never invent weight that isn't there.

OUTPUT
Respond with ONLY a JSON object — no markdown, no code fences:
{"phase":"framing|interview|mirror|close|safety","message":"...","pathA":"... or null","pathB":"... or null","handback":"... or null","pulls":[{"toward":"A","kind":"felt","label":"...","weight":2}]}
Set pathA and pathB at framing and keep them stable. "message" is what the person reads. "handback" is used only on mirror/close. "pulls" is [] unless a reason surfaced.`;

const state = {
  apiMessages: [],
  decision: "",
  pathA: null,
  pathB: null,
  lastPhase: "start",
  userExchanges: 0,
  mirrorText: "",
  done: false,
  busy: false,
  // where reasoning has gathered — each entry { label, weight }
  weights: { A: { stated: [], felt: [] }, B: { stated: [], felt: [] } },
  arrived: false,
};

const log = document.getElementById("log");
const input = document.getElementById("input");
const send = document.getElementById("send");
const dock = document.getElementById("dock");
const actions = document.getElementById("actions");
const errEl = document.getElementById("err");

const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// --- digital rain (slow, sparse, behind everything) ---
// --- digital rain with requestAnimationFrame + Visibility API ---
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
const glyphs = "アイウエオカキクケコサシ0123456789<>/{}[]=";
let cols = 0, drops = [], rainId = null, rainActive = false;
const FS = 16;

function sizeRain() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / FS);
  drops = new Array(cols).fill(0).map(() => Math.random() * -canvas.height);
}

function drawRain() {
  if (!rainActive || document.hidden) {
    rainId = requestAnimationFrame(drawRain);
    return;
  }
  
  ctx.fillStyle = "rgba(10,15,11,0.12)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FS + "px monospace";
  ctx.fillStyle = "rgba(127,227,161,0.20)";
  
  for (let i = 0; i < cols; i++) {
    if (i % 2 === 0) continue; // sparse
    const ch = glyphs[(Math.random() * glyphs.length) | 0];
    const x = i * FS;
    const y = drops[i] * FS;
    ctx.fillText(ch, x, y);
    if (y > canvas.height && Math.random() > 0.98) drops[i] = 0;
    drops[i] += 0.20;
  }
  rainId = requestAnimationFrame(drawRain);
}

function startRain() {
  if (reduceMotion) { canvas.style.opacity = "0"; return; }
  sizeRain();
  rainActive = true;
  if (!rainId) rainId = requestAnimationFrame(drawRain);
}

function stopRain() {
  rainActive = false;
  if (rainId) { cancelAnimationFrame(rainId); rainId = null; }
  canvas.style.opacity = "0";
}

// Pause when tab is hidden
document.addEventListener("visibilitychange", () => {
  if (document.hidden && rainActive) {
    // drawRain will skip rendering, but keep the loop alive
  } else if (!document.hidden && rainActive && !rainId) {
    rainId = requestAnimationFrame(drawRain);
  }
});

// Start the rain (keep this line – it's already in your code)
startRain();

// --- conversation ---
addCompanion("What decision are you sitting with?");

function addCompanion(text, reflect) {
  const t = document.createElement("div");
  t.className = "turn companion reveal" + (reflect ? " reflect" : "");
  const b = document.createElement("div");
  b.className = "body";
  b.textContent = text;
  t.appendChild(b);
  log.appendChild(t);
  scrollLog();
}
function addUser(text) {
  const t = document.createElement("div");
  t.className = "turn user reveal";
  const b = document.createElement("div");
  b.className = "body";
  b.textContent = text;
  t.appendChild(b);
  log.appendChild(t);
  scrollLog();
}
function addCare() {
  const c = document.createElement("div");
  c.className = "care reveal";
  c.innerHTML = "If things feel unsafe right now, please reach out to someone you trust. In the US you can call or text <strong>988</strong> (Suicide &amp; Crisis Lifeline), any time.";
  log.appendChild(c);
  scrollLog();
}

let thinkingEl = null;
function showThinking() {
  thinkingEl = document.createElement("div");
  thinkingEl.className = "turn companion";
  thinkingEl.innerHTML = '<div class="thinking"><span class="blk"></span></div>';
  log.appendChild(thinkingEl);
  scrollLog();
}
function clearThinking() { if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; } }
function scrollLog() { log.scrollTop = log.scrollHeight; }

function showPaths() {
  if (!state.pathA || !state.pathB) return;
  document.getElementById("pathA").textContent = state.pathA;
  document.getElementById("pathB").textContent = state.pathB;
  document.getElementById("paths").classList.add("shown");
}
// --- the gauge: reasoning gathering weight on the two paths ---
function applyPulls(pulls) {
  if (!Array.isArray(pulls)) return;
  for (const p of pulls) {
    if (!p) continue;
    const side = p.toward === "B" ? "B" : (p.toward === "A" ? "A" : null);
    const kind = p.kind === "stated" ? "stated" : (p.kind === "felt" ? "felt" : null);
    if (!side || !kind) continue;
    let label = String(p.label || "").trim().toLowerCase();
    if (!label) continue;
    if (label.length > 34) label = label.slice(0, 33).trim() + "…";
    let w = Math.round(Number(p.weight));
    if (!(w >= 1)) w = 1;
    if (w > 3) w = 3;
    state.weights[side][kind].push({ label, weight: w });
    if (!state.arrived) floatMark(side, label, kind);
  }
  renderFills();
}
function colWeight(side) {
  const c = state.weights[side];
  const felt = c.felt.reduce((s, f) => s + f.weight, 0);
  const stated = c.stated.reduce((s, f) => s + f.weight, 0);
  return { felt, stated, heft: felt + stated * 0.4 };
}
function renderFills() {
  const a = colWeight("A"), b = colWeight("B");
  const max = Math.max(a.heft, b.heft, 6); // stable ceiling so the first marks read light
  setFill("fillA", a.heft / max);
  setFill("fillB", b.heft / max);
}
function setFill(id, ratio) {
  const el = document.getElementById(id);
  if (el) el.style.height = (Math.max(0, Math.min(1, ratio)) * 88) + "%";
}
function floatMark(side, label, kind) {
  if (reduceMotion) return;
  const path = document.getElementById(side === "A" ? "fillA" : "fillB").parentElement;
  const m = document.createElement("div");
  m.className = "floatmark" + (kind === "stated" ? " stated" : "");
  m.textContent = label;
  path.appendChild(m);
  setTimeout(() => m.remove(), 2300);
}
function fragEl(label, kind) {
  const e = document.createElement("div");
  e.className = "frag " + kind;
  e.textContent = label;
  return e;
}
function renderFrags() {
  for (const side of ["A", "B"]) {
    const box = document.getElementById(side === "A" ? "fragsA" : "fragsB");
    box.innerHTML = "";
    const c = state.weights[side];
    const byWeight = (x, y) => y.weight - x.weight;
    [...c.felt].sort(byWeight).forEach(f => box.appendChild(fragEl(f.label, "felt")));
    [...c.stated].sort(byWeight).forEach(f => box.appendChild(fragEl(f.label, "stated")));
    if (!c.felt.length && !c.stated.length) {
      const e = document.createElement("div");
      e.className = "frag";
      e.textContent = "—";
      e.style.color = "var(--accent-dim)";
      e.style.opacity = "0.45";
      box.appendChild(e);
    }
  }
}
function enterRoom(message, handback) {
  state.arrived = true;
  state.mirrorText = message || "";
  document.body.classList.add("reflecting");
  document.body.classList.add("arrived");
  stopRain();
  renderFrags();
  renderFills();
  const m = document.getElementById("mirror");
  m.textContent = message || "";
  if (handback) {
    const h = document.createElement("span");
    h.className = "handback";
    h.textContent = handback;
    m.appendChild(h);
  }
  finish();
}
function finish() { state.done = true; dock.style.display = "none"; actions.classList.add("shown"); }

function parseTurn(raw) {
  let t = (raw || "").trim();
  t = t.replace(/^```(json)?/i, "").replace(/```$/, "").trim();
  const s = t.indexOf("{"), e = t.lastIndexOf("}");
  if (s >= 0 && e >= 0) t = t.slice(s, e + 1);
  return JSON.parse(t);
}
function pacingNote() {
  if (state.lastPhase === "start") return "This is their opening message — the decision itself. Move to framing.";
  if (state.userExchanges >= 8) return "You have explored enough. Move to the mirror now — reflect the gap and hand it back in the same turn.";
  if (state.userExchanges >= 5) return "Enough may have surfaced. If the real weight is clear, move to the mirror.";
  return "Stay in the interview; keep following the thread.";
}

async function callModel() {
  const system = SYSTEM_PROMPT +
    "\n\n[STATE] Previous phase: " + state.lastPhase +
    ". Exchanges since the decision: " + state.userExchanges + ". " + pacingNote();
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: system,
      messages: state.apiMessages,
    }),
  });
  if (!res.ok) throw new Error("status " + res.status);
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  return parseTurn(text);
}

async function handleSend() {
  const value = input.value.trim();
  if (!value || state.busy || state.done) return;
  errEl.hidden = true;
  addUser(value);
  state.apiMessages.push({ role: "user", content: value });
  if (state.lastPhase === "start") state.decision = value;
  else state.userExchanges += 1;
  input.value = "";
  autosize();
  setBusy(true);
  showThinking();
  try {
    const turn = await callModel();
    clearThinking();
    state.apiMessages.push({ role: "assistant", content: JSON.stringify(turn) });
    if (turn.pathA && turn.pathB && !state.pathA) {
      state.pathA = turn.pathA;
      state.pathB = turn.pathB;
      showPaths();
    }
    applyPulls(turn.pulls);
    const phase = turn.phase || "interview";
    state.lastPhase = phase;
    if (phase === "safety") {
      addCompanion(turn.message);
      addCare();
    } else if (phase === "mirror" || phase === "close") {
      enterRoom(turn.message, turn.handback);
    } else {
      addCompanion(turn.message);
    }
    updatePlaceholder();
  } catch (e) {
    clearThinking();
    errEl.hidden = false;
    errEl.textContent = "the line dropped for a second — send that again when you're ready.";
    state.apiMessages.pop();
    if (state.lastPhase !== "start") state.userExchanges -= 1;
    input.value = value;
    autosize();
  } finally {
    setBusy(false);
  }
}

function updatePlaceholder() {
  if (state.lastPhase === "interview" || state.lastPhase === "mirror") {
    input.placeholder = "take your time...";
  }
}
function setBusy(b) {
  state.busy = b;
  send.disabled = b;
  input.disabled = b;
  if (!b) input.focus();
}
function autosize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
}

input.addEventListener("input", autosize);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
send.addEventListener("click", handleSend);
document.getElementById("over").addEventListener("click", () => location.reload());
function weightSummary() {
  const out = [];
  [["A", state.pathA], ["B", state.pathB]].forEach(([side, name]) => {
    const c = state.weights[side];
    if (!c.felt.length && !c.stated.length) return;
    out.push((name || side) + ":");
    if (c.felt.length) out.push("  pulled toward — " + c.felt.map(f => f.label).join(", "));
    if (c.stated.length) out.push("  reasons given — " + c.stated.map(f => f.label).join(", "));
  });
  return out.join("\n");
}
document.getElementById("keep").addEventListener("click", (e) => {
  const paths = (state.pathA && state.pathB) ? state.pathA + " | " + state.pathB : (state.pathA || state.pathB || "");
  const gathered = weightSummary();
  const summary =
    "white rabbit — what surfaced\n\n" +
    "the decision: " + state.decision + "\n" +
    (paths ? "the two paths: " + paths + "\n" : "") +
    (gathered ? "\nwhere the weight gathered:\n" + gathered + "\n" : "") +
    (state.mirrorText ? "\nwhat surfaced underneath:\n" + state.mirrorText + "\n" : "");
  navigator.clipboard.writeText(summary).then(() => {
    e.target.textContent = "copied";
    setTimeout(() => (e.target.textContent = "keep this"), 1600);
  }).catch(() => {
    e.target.textContent = "copy failed";
    setTimeout(() => (e.target.textContent = "keep this"), 1600);
  });
});

input.focus();
</script>
</body>
